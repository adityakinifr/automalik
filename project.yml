name: AutoMalik
options:
  bundleIdPrefix: com.automalik
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  AutoMalik:
    type: application
    platform: macOS
    sources:
      - AutoMalik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.automalik.AutoMalik
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: AutoMalik/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AutoMalik/Resources/AutoMalik.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: AutoMalik/Resources/AutoMalik.entitlements
      properties: {}
